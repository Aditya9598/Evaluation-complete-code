<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eval Workspace — Docs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="docs.css" />
  </head>
  <body class="docs-page">
    <header class="topbar docs-topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="url(#g)" />
            <path
              d="M8 22V10h4.2c2.4 0 3.9 1.2 3.9 3.1 0 1.3-.7 2.3-1.9 2.8L18 22h-2.8l-2.9-5.2H10.6V22H8zm2.6-7.4h1.5c1 0 1.5-.5 1.5-1.3s-.5-1.3-1.5-1.3h-1.5v2.6zM20 22l3.2-12h2.6L22.4 22H20z"
              fill="#fff"
            />
            <defs>
              <linearGradient id="g" x1="4" y1="4" x2="28" y2="28" gradientUnits="userSpaceOnUse">
                <stop stop-color="#5B9BFF" />
                <stop offset="1" stop-color="#3D6FD9" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1>Eval Workspace Docs</h1>
          <p>Examiner and team documentation</p>
        </div>
      </div>
      <div class="meta">
        <a href="index.html" class="docs-back">← Back to hub</a>
      </div>
    </header>

    <nav class="docs-tabs" role="tablist" aria-label="Documentation sections">
      <button
        type="button"
        class="docs-tab active"
        data-docs-tab="eval-framework"
        role="tab"
        aria-selected="true"
      >
        Eval Framework + Workspace Projects
      </button>
      <button
        type="button"
        class="docs-tab"
        data-docs-tab="detailed-guide"
        role="tab"
        aria-selected="false"
      >
        Complete Projects Guide
      </button>
      <button type="button" class="docs-tab" data-docs-tab="projects-overview" role="tab" aria-selected="false">
        Projects Overview
      </button>
    </nav>

    <main class="docs-main">
      <div id="docs-loading" class="docs-loading hidden">Loading…</div>
      <div id="docs-error" class="docs-error hidden"></div>

      <article
        id="docs-panel-eval-framework"
        class="docs-panel docs-md-body"
        role="tabpanel"
        data-src="docs/content/eval-framework.md"
      ></article>
      <article
        id="docs-panel-detailed-guide"
        class="docs-panel docs-md-body hidden"
        role="tabpanel"
        data-src="docs/content/detailed-guide.md"
      ></article>
      <article
        id="docs-panel-projects-overview"
        class="docs-panel docs-md-body hidden"
        role="tabpanel"
        data-src="docs/content/projects-overview.md"
      ></article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="docs.js"></script>
  </body>
</html>
