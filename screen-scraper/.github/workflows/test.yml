name: screen-scraper CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Python tests
        run: |
          cd scorer-gateway
          python -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt
          pytest -v -m "not live"

      - name: Rust tests
        run: cd scorer && cargo test

      - name: Worker tests
        run: cd worker && npm test

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build
